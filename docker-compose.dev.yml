version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: stelladullam-pg-dev
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: stelladullam_defi
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:latest
    container_name: stelladullam-redis-dev
    ports:
      - "6379:6379"

volumes:
  postgres_data:
